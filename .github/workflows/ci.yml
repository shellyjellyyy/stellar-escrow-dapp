name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  contracts:
    name: Smart contracts (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          # Soroban's wasm VM doesn't yet support the reference-types wasm
          # encoding that Rust 1.81+ emits by default for wasm32 targets.
          # See rust-toolchain.toml at the repo root for the full story.
          toolchain: "1.80.1"
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build reputation-contract to WASM
        run: cargo build --target wasm32-unknown-unknown --release -p reputation-contract
        # escrow-contract's contractimport! reads this wasm file directly at
        # its own compile time (even for `cargo test`, not just wasm builds),
        # so it has to exist before anything touches escrow-contract below.

      - name: Run contract unit tests
        run: cargo test --workspace --verbose

      - name: Build escrow-contract to WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release -p escrow-contract

      - name: Upload compiled WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
